<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Layout Exercise</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- fix the width of the containers at max-width: 1200px; -->
    <!-- make all the body color: black font-family Arial-->
    <!-- links are for the most part white -->
    <!-- bg color #e9edee -->
    <header>
      <div class="container">
        <div class="logo-up">
          <!-- bg color #222f3f -->
          <img src="./images/logo.png" alt="Logo Amazon" />
        </div>
        <nav>
          <!-- bg color #364757 -->
          <ul>
            <!-- make all nav ul li into inline-block elements plus color white. Makes sense to give them a class -->
            <li class="navLi"><a href="#"></a>All</li>
            <li class="navLi"><a href="#"></a>Today's deals</li>
            <li class="navLi"><a href="#"></a>Customer Service</li>
            <li class="navLi"><a href="#"></a>Registry</li>
            <li class="navLi"><a href="#"></a>Gift Cards</li>
            <li class="navLi"><a href="#"></a>Sell</li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <div class="container">
        <section class="s1">
          <!-- bg color #f66502 -->
          <a href="#">Shop All Holiday Gift Cards</a>
        </section>
        <section class="s2">
          <h1>Holiday gift Guides</h1>
          <p>Be a go-gifter</p>
          <!-- bg image-->
          <!-- /Either make this whole section into a big pushable link or turn the h1 into an <a>, first one is better for UX -->
        </section>
        <section class="s3">
          <!-- bg color white  color link #246a71 -->
          <h2>
            Find the perfect gift<span><a href="#">Shop Now</a></span>
          </h2>
          <!-- make all cards rounder and shaded. Vertical align-->
          <div class="cards">
            <div class="card">
              <img src="./images/img_1.jpg" alt="Kindle" />
            </div>
            <div class="card">
              <img src="./images/img_2.jpg" alt="Desk" />
            </div>
            <div class="card">
              <img src="./images/img_3.jpg" alt="Watches" />
            </div>
            <div class="card">
              <img src="./images/img_4.jpg" alt="Pets" />
            </div>
          </div>
        </section>
        <section class="banners">
          <div class="banner">
            <img src="./images/img_9.png" alt="VR" />
            <h2>
              Play the gifting game <span><a href="#">Shop Gaming</a></span>
            </h2>
          </div>
          <div class="banner">
            <img src="./images/img_10.png" alt="Bedside Table" />
            <h2>
              The sound of cheer
              <span><a href="#">Shop Audio & Accessories</a></span>
            </h2>
          </div>
        </section>
      </div>
    </main>
    <footer>
      <div class="container">
        <div class="link-to-top">
          <a href="#top">Back to top</a>
          <!-- try meking an anchor to the top of the page-->
           <!-- FUNZIONAAAA -->
          <!-- bg color #364757 -->
        </div>
        <div class="logo-down">
          <!-- bg color #222f3f -->
          <img src="./images/logo.png" alt="Logo Amazon" />
        </div>
      </div>
    </footer>
  </body>
</html>
